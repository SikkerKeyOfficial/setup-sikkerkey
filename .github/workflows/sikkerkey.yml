name: SikkerKey Secrets
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch SikkerKey secrets
        env:
          SK_VAULT_ID: ${{ secrets.SIKKERKEY_VAULT_ID }}
          SK_PROJECT_ID: ${{ secrets.SIKKERKEY_PROJECT_ID }}
          SK_MACHINE_ID: ${{ secrets.SIKKERKEY_MACHINE_ID }}
          SK_PRIVATE_KEY: ${{ secrets.SIKKERKEY_PRIVATE_KEY }}
        run: |
          python3 -c "
          import os, json, hashlib, time, uuid, urllib.request
          from cryptography.hazmat.primitives.serialization import load_pem_private_key
          from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PrivateKey
          import base64

          key = load_pem_private_key(os.environ['SK_PRIVATE_KEY'].encode(), password=None)
          machine_id = os.environ['SK_MACHINE_ID']
          project_id = os.environ['SK_PROJECT_ID']

          method = 'POST'
          path = '/v1/secrets/export'
          timestamp = str(int(time.time()))
          nonce = uuid.uuid4().hex
          body = json.dumps({'projectId': project_id})
          body_hash = hashlib.sha256(body.encode()).hexdigest()

          payload = f'{method}:{path}:{timestamp}:{nonce}:{body_hash}'
          signature = base64.b64encode(key.sign(payload.encode())).decode()

          req = urllib.request.Request('https://api.sikkerkey.com/v1/secrets/export', data=body.encode(), method='POST')
          req.add_header('Content-Type', 'application/json')
          req.add_header('X-Machine-Id', machine_id)
          req.add_header('X-Timestamp', timestamp)
          req.add_header('X-Nonce', nonce)
          req.add_header('X-Signature', signature)

          resp = urllib.request.urlopen(req)
          data = json.loads(resp.read())

          env_file = os.environ['GITHUB_ENV']
          with open(env_file, 'a') as f:
              for s in data.get('secrets', []):
                  name = s['name'].upper().replace(' ', '_').replace('-', '_')
                  value = s['value']
                  fields = s.get('fieldNames')
                  if fields:
                      try:
                          parsed = json.loads(value)
                          for k, v in parsed.items():
                              fn = name + '_' + k.upper().replace(' ', '_').replace('-', '_')
                              print(f'::add-mask::{v}')
                              f.write(f'{fn}={v}\n')
                      except: pass
                  else:
                      print(f'::add-mask::{value}')
                      f.write(f'{name}={value}\n')
          print(f'Loaded {len(data.get(\"secrets\", []))} secrets')
          "

      # Your build steps below - secrets are available as environment variables
      - run: echo "SikkerKey secrets loaded"